<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Your Photo Album</title>
    <link rel="stylesheet" href="css/style.css">
</head>

<body>

    <div class="container">

        <h1>📍 Photo Album</h1>

        <!-- Locked photo card -->
        <div class="photo-card">
            <div class="photo-overlay">
                <img id="albumPhoto"
                     src="https://picsum.photos/seed/album1/800/500"
                     alt="Album Photo">
                <div id="lockBadge">🔒</div>
            </div>
            <div class="card-actions">
                <button id="viewPhotoBtn">👁️ View This Photo</button>
                <p id="status"></p>
            </div>
        </div>

        
    </div>

    <!-- IMPORTANT: Update the src path if needed -->
    <script src="js/location.js"></script>

</body>

</html>
