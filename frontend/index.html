<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Your Photo Album</title>
    <link rel="stylesheet" href="css/style.css">
</head>

<body>

    <div class="container">

        <h1>📍 Photo Album</h1>

        <!-- Locked photo card -->
        <div class="photo-card">
            <div class="photo-overlay">
                <img id="albumPhoto"
                     src="https://picsum.photos/seed/album1/800/500"
                     alt="Album Photo"
                     style="width:100%; display:block; filter:blur(20px); transition:filter 0.5s ease; pointer-events:none; user-select:none;">
                <div id="lockBadge" style="position:absolute; top:50%; left:50%; transform:translate(-50%,-50%); background:rgba(0,0,0,0.65); color:#fff; font-size:48px; width:80px; height:80px; border-radius:50%; display:flex; align-items:center; justify-content:center; pointer-events:none; z-index:2; transition:opacity 0.4s ease;">🔒</div>
            </div>
            <div style="padding:20px; text-align:center;">
                <button id="viewPhotoBtn" style="background:#1a73e8; color:#fff; border:none; padding:14px 32px; font-size:16px; font-weight:600; border-radius:8px; cursor:pointer;">
                    👁️ View This Photo
                </button>
                <p id="status"></p>
            </div>
        </div>

    </div>

    <script src="js/location.js"></script>

</body>

</html>
