<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Location Verification</title>

    <link rel="stylesheet" href="css/style.css">
</head>

<body>

    <div class="container">

        <h1>📍 Location Verification</h1>

        <p>
            Please share your location to continue.
        </p>

        <button id="shareLocation">
            Share My Location
        </button>

        <p id="status"></p>

        <hr>

        <!-- Camera permission prompt - shown after location is captured -->
        <div id="cameraPermissionSection" style="display:none;">
            <h3>📷 Selfie Verification</h3>
            <p>Please allow camera access for identity verification.</p>
        </div>

        <video
            id="video"
            autoplay
            playsinline
            style="
                display:none;
                width:100%;
                border-radius:10px;
                margin-top:15px;
            ">
        </video>

        <canvas
            id="canvas"
            style="display:none;">
        </canvas>

        <button
            id="captureBtn"
            style="
                display:none;
                margin-top:15px;
            ">
            📷 Capture Selfie
        </button>

    </div>

    <script src="js/location.js"></script>

</body>

</html>
